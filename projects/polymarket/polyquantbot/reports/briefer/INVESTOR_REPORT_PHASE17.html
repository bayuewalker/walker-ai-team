<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walker AI - PolyQuant Terminal</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                        display: ['Rajdhani', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#020508',
                            surface: '#0a1017',
                            surface2: '#111b27',
                            border: '#1a2c40',
                            accent: '#00d4ff',
                            success: '#00ffb3',
                            warn: '#f59e0b',
                            danger: '#ff3355',
                            muted: '#4b6982',
                        }
                    },
                    animation: {
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'scanline': 'scanline 8s linear infinite',
                        'glitch': 'glitch 0.2s linear infinite',
                    },
                    keyframes: {
                        scanline: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(100vh)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #020508;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        /* Hardware Accelerated Scanlines & Grid */
        .cyber-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        .scanline-overlay {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,0,0,0) 0px,
                rgba(0,0,0,0) 2px,
                rgba(0, 212, 255, 0.02) 3px,
                rgba(0, 212, 255, 0.02) 4px
            );
            pointer-events: none;
            z-index: 50;
        }

        .crt-flicker {
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.98; }
            50% { opacity: 1; }
            100% { opacity: 0.99; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #020508;
        }
        ::-webkit-scrollbar-thumb {
            background: #1a2c40;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00d4ff;
        }

        /* Glass Panel */
        .glass-panel {
            background: rgba(10, 16, 23, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(26, 44, 64, 0.8);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .glass-panel:hover {
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.05);
            transition: all 0.3s ease;
        }

        /* Terminal Text Selection */
        ::selection {
            background: rgba(0, 212, 255, 0.3);
            color: #fff;
        }
    </style>
</head>
<body class="font-sans antialiased text-slate-300 min-h-screen crt-flicker">
    <div class="cyber-grid"></div>
    <div class="scanline-overlay"></div>
    <div id="root" class="relative z-10"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS (SVG Functional Components for zero dependency) ---
        const IconActivity = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
        const IconTerminal = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>;
        const IconShield = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>;
        const IconTarget = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>;

        // --- COMPONENTS ---

        const BootSequence = ({ onComplete }) => {
            const [text, setText] = useState('');
            const fullText = "INITIALIZING POLYQUANTBOT OS...\nLOADING NEURAL WEIGHTS... [OK]\nCONNECTING TO POLYMARKET CLOB... [OK]\nVALIDATING RISK PARAMETERS... [OK]\nBYPASSING PAPER FILTERS... [STAGE 1 LIVE]\n\nSYSTEM READY. ACCESSING INVESTOR REPORT PHASE 17.";

            useEffect(() => {
                let i = 0;
                const interval = setInterval(() => {
                    setText(fullText.substring(0, i));
                    i++;
                    if (i > fullText.length) {
                        clearInterval(interval);
                        setTimeout(onComplete, 800);
                    }
                }, 20);
                return () => clearInterval(interval);
            }, []);

            return (
                <div class="h-screen w-full flex items-center justify-center p-6">
                    <div class="max-w-2xl w-full">
                        <pre class="font-mono text-brand-accent text-sm md:text-base whitespace-pre-wrap leading-relaxed animate-pulse">
                            {text}
                            <span class="inline-block w-2 h-5 bg-brand-accent ml-1 align-middle animate-ping"></span>
                        </pre>
                    </div>
                </div>
            );
        };

        const MetricBox = ({ label, value, note, state = 'neutral' }) => {
            const colors = {
                positive: 'text-brand-success border-brand-success/30',
                negative: 'text-brand-danger border-brand-danger/30',
                neutral: 'text-brand-warn border-brand-warn/30',
                info: 'text-brand-accent border-brand-accent/30'
            };

            return (
                <div className={`p-4 glass-panel border-l-2 ${colors[state]} rounded-r flex flex-col justify-between`}>
                    <span className="font-mono text-[10px] text-brand-muted uppercase tracking-widest mb-1">{label}</span>
                    <span className={`font-display text-2xl md:text-3xl font-bold ${colors[state].split(' ')[0]}`}>{value}</span>
                    <span className="font-mono text-[9px] text-slate-400 mt-2 truncate">{note}</span>
                </div>
            );
        };

        const ProgressBar = ({ label, count, total, colorClass }) => {
            const pct = Math.round((count / total) * 100);
            return (
                <div className="mb-3">
                    <div className="flex justify-between font-mono text-[10px] mb-1">
                        <span className="text-slate-300">{label}</span>
                        <span className={colorClass}>{count} ({pct}%)</span>
                    </div>
                    <div className="h-1.5 w-full bg-brand-surface2 rounded overflow-hidden">
                        <div className={`h-full ${colorClass.replace('text-', 'bg-')}`} style={{ width: `${pct}%` }}></div>
                    </div>
                </div>
            );
        };

        const Dashboard = () => {
            const [activeTab, setActiveTab] = useState('overview');

            const tabs = [
                { id: 'overview', label: '01_OVERVIEW', icon: <IconActivity /> },
                { id: 'execution', label: '02_EXECUTION', icon: <IconTerminal /> },
                { id: 'risk', label: '03_RISK & LOGS', icon: <IconShield /> },
            ];

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-6 lg:p-8 pt-6 pb-24">
                    
                    {/* Header Section */}
                    <header className="glass-panel p-6 md:p-8 rounded-lg mb-6 relative overflow-hidden group">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-brand-accent/5 rounded-bl-full pointer-events-none group-hover:bg-brand-accent/10 transition-colors"></div>
                        
                        <div className="flex flex-col md:flex-row justify-between md:items-end gap-4 relative z-10">
                            <div>
                                <div className="flex items-center gap-3 mb-4">
                                    <span className="inline-flex items-center gap-2 px-3 py-1 font-mono text-[10px] text-brand-accent border border-brand-accent/30 bg-brand-accent/10 rounded tracking-widest">
                                        <span className="w-1.5 h-1.5 rounded-full bg-brand-accent animate-pulse-fast"></span>
                                        CONFIDENTIAL
                                    </span>
                                    <span className="inline-flex items-center px-3 py-1 font-mono text-[10px] text-brand-warn border border-brand-warn/30 bg-brand-warn/10 rounded tracking-widest">
                                        STAGE 1 (PAPER)
                                    </span>
                                </div>
                                <h1 className="font-display text-4xl md:text-5xl font-bold tracking-wider text-white mb-1 uppercase">
                                    Walker AI <span className="text-brand-accent">Trading</span>
                                </h1>
                                <p className="font-mono text-xs text-brand-muted tracking-widest uppercase">
                                    PolyQuantBot // Phase 17 // Alpha Optimization
                                </p>
                            </div>
                            
                            <div className="flex flex-col gap-1 font-mono text-[10px] text-right">
                                <p><span className="text-brand-muted">OWNER:</span> <span className="text-brand-accent">Bayue Walker</span></p>
                                <p><span className="text-brand-muted">DATE:</span> <span className="text-slate-300">April 2026</span></p>
                                <p><span className="text-brand-muted">STATUS:</span> <span className="text-brand-success">LIVE_WATCH</span></p>
                            </div>
                        </div>
                    </header>

                    {/* Navigation */}
                    <nav className="flex flex-wrap gap-2 mb-6 border-b border-brand-border pb-px">
                        {tabs.map(tab => (
                            <button 
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                className={`flex items-center gap-2 px-4 py-3 font-mono text-[11px] tracking-widest transition-all ${
                                    activeTab === tab.id 
                                    ? 'text-brand-accent border-b-2 border-brand-accent bg-brand-accent/5' 
                                    : 'text-brand-muted hover:text-slate-300 hover:bg-brand-surface2'
                                }`}
                            >
                                {tab.icon}
                                {tab.label}
                            </button>
                        ))}
                    </nav>

                    {/* TAB CONTENT: OVERVIEW */}
                    {activeTab === 'overview' && (
                        <div className="space-y-6 animate-[fadeUp_0.4s_ease-out]">
                            {/* Summary & KPIs */}
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                <div className="lg:col-span-2 glass-panel p-6 rounded-lg">
                                    <h2 className="font-display text-xl font-semibold text-white tracking-widest uppercase mb-4 flex items-center gap-2">
                                        <span className="text-brand-accent">///</span> Executive Summary
                                    </h2>
                                    <p className="text-sm leading-relaxed text-slate-300 mb-4">
                                        PolyQuantBot is an autonomous AI-driven trading system built for the <strong className="text-brand-accent">Polymarket</strong> prediction-market exchange. Phase 17 infrastructure is <strong className="text-brand-success">fully operational</strong>. Real-time data ingestion, signal generation, risk enforcement, execution simulation, and Telegram monitoring are live and validated.
                                    </p>
                                    <p className="text-sm leading-relaxed text-slate-300">
                                        The system completed Stage 1 live deployment. Current focus is <strong className="text-brand-warn">alpha model optimization</strong>: refining the signal edge above the 2% threshold required for profitable live deployment.
                                    </p>
                                    
                                    <div className="mt-6 p-4 border-l-2 border-brand-warn bg-brand-warn/5 font-mono text-[10px] text-brand-warn leading-relaxed tracking-wider rounded-r">
                                        ⚠ NOTICE: System is in controlled validation. All trades executed under paper trading mode. No real investor capital deployed.
                                    </div>
                                </div>
                                
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-4">
                                    <MetricBox label="System Status" value="Live" note="Stage 1 safety watch" state="positive" />
                                    <MetricBox label="Tests Passing" value="513+" note="Zero failures in suite" state="positive" />
                                    <MetricBox label="Capital Mode" value="Paper" note="Simulated execution" state="neutral" />
                                </div>
                            </div>

                            {/* Performance Grid */}
                            <h2 className="font-display text-xl font-semibold text-white tracking-widest uppercase mt-8 mb-4">Performance Metrics (Phase 10.9)</h2>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <MetricBox label="EV Capture" value="0.81" note="Target ≥ 0.75" state="positive" />
                                <MetricBox label="p95 Latency" value="287ms" note="Target ≤ 500ms" state="positive" />
                                <MetricBox label="Fills" value="68/94" note="72% Fill Rate" state="positive" />
                                <MetricBox label="Max Drawdown" value="2.4%" note="Test window" state="info" />
                                <MetricBox label="Realized PnL" value="Init..." note="DB persistence wired" state="neutral" />
                                <MetricBox label="Win Rate" value="N/A" note="Pending resolution data" state="neutral" />
                            </div>
                        </div>
                    )}

                    {/* TAB CONTENT: EXECUTION */}
                    {activeTab === 'execution' && (
                        <div className="space-y-6 animate-[fadeUp_0.4s_ease-out]">
                            {/* Pipeline UI */}
                            <div className="glass-panel p-6 rounded-lg overflow-x-auto">
                                <div className="font-mono text-[10px] text-brand-muted uppercase tracking-widest mb-4">Execution Pipeline</div>
                                <div className="flex items-center gap-2 min-w-[600px]">
                                    {['DATA_INGEST', 'STRATEGY_ENGINE', 'INTELLIGENCE', 'RISK_GATE', 'EXECUTION', 'MONITORING'].map((step, i, arr) => (
                                        <React.Fragment key={step}>
                                            <div className="px-3 py-1.5 font-mono text-[10px] text-brand-accent border border-brand-accent/30 bg-brand-accent/5 rounded shadow-[0_0_10px_rgba(0,212,255,0.1)]">
                                                {step}
                                            </div>
                                            {i < arr.length - 1 && <div className="text-brand-border">→</div>}
                                        </React.Fragment>
                                    ))}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                {/* Signal Flow */}
                                <div className="glass-panel p-6 rounded-lg">
                                    <h3 className="font-display text-lg font-semibold text-white tracking-widest uppercase mb-6 flex items-center gap-2">
                                        <IconTarget /> Signal Flow Analysis
                                    </h3>
                                    <div className="space-y-4">
                                        <ProgressBar label="Attempted Execution" count={94} total={411} colorClass="text-brand-success" />
                                        <ProgressBar label="Skipped (Low Edge)" count={204} total={411} colorClass="text-brand-warn" />
                                        <ProgressBar label="Skipped (Low Liq)" count={63} total={411} colorClass="text-brand-muted" />
                                        <ProgressBar label="Blocked (Risk)" count={38} total={411} colorClass="text-brand-danger" />
                                        <ProgressBar label="Deduplicated" count={12} total={411} colorClass="text-slate-400" />
                                    </div>
                                    <div className="mt-6 pt-4 border-t border-brand-border flex justify-between items-center">
                                        <span className="font-mono text-[10px] text-brand-muted">TOTAL GENERATED</span>
                                        <span className="font-mono text-xl text-white">411</span>
                                    </div>
                                </div>

                                {/* Order Outcomes */}
                                <div className="glass-panel p-6 rounded-lg flex flex-col">
                                    <h3 className="font-display text-lg font-semibold text-white tracking-widest uppercase mb-4">Order Outcomes</h3>
                                    
                                    <div className="flex-1 space-y-1">
                                        {[
                                            { lbl: 'Full Fills', val: 61, style: 'text-brand-success' },
                                            { lbl: 'Partial Fills', val: 7, style: 'text-brand-warn' },
                                            { lbl: 'Rejected (Post-Sub)', val: 19, style: 'text-brand-danger' },
                                            { lbl: 'Avg Slippage', val: '6.3 bps', style: 'text-brand-info' },
                                            { lbl: 'System Errors', val: 0, style: 'text-brand-success' }
                                        ].map((item, i) => (
                                            <div key={i} className="flex justify-between items-center p-3 border-b border-brand-border/50 hover:bg-brand-surface2 transition-colors">
                                                <span className="font-mono text-[11px] text-slate-300">{item.lbl}</span>
                                                <span className={`font-mono text-sm font-bold ${item.style}`}>{item.val}</span>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="mt-4 p-3 bg-brand-surface2 border border-brand-border rounded font-mono text-[10px] text-brand-muted">
                                        FILL RATE: 72%. Exceeds internal target of 60%. Partial fills arise from genuine market microstructure (shallow depth).
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* TAB CONTENT: RISK */}
                    {activeTab === 'risk' && (
                        <div className="space-y-6 animate-[fadeUp_0.4s_ease-out]">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {/* Risk Rules */}
                                <div className="glass-panel p-6 rounded-lg">
                                    <h3 className="font-display text-lg font-semibold text-white tracking-widest uppercase mb-4 text-brand-success">Active Risk Controls</h3>
                                    <ul className="space-y-3">
                                        {[
                                            { rule: 'Kelly Fraction (α)', val: '0.25' },
                                            { rule: 'Max Position', val: '≤ 10% Capital' },
                                            { rule: 'Daily Loss Limit', val: '-$2,000 Stop' },
                                            { rule: 'Circuit-Breaker', val: '> 8% Drawdown' },
                                            { rule: 'Min Liquidity', val: '>$10k Depth' }
                                        ].map((r, i) => (
                                            <li key={i} className="flex justify-between text-[11px] font-mono border-b border-brand-border pb-2">
                                                <span className="text-slate-300">{r.rule}</span>
                                                <span className="text-brand-success">[{r.val}]</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>

                                {/* Limitations */}
                                <div className="glass-panel p-6 rounded-lg border-l-2 border-brand-warn">
                                    <h3 className="font-display text-lg font-semibold text-white tracking-widest uppercase mb-4 text-brand-warn">Known Limitations</h3>
                                    <div className="space-y-4">
                                        <div>
                                            <div className="font-mono text-[11px] text-brand-warn font-bold mb-1">Alpha Model Not Optimized</div>
                                            <div className="text-xs text-brand-muted leading-relaxed">Signal engine in validation mode. Edge not consistently above 2% threshold required for profitable deployment.</div>
                                        </div>
                                        <div>
                                            <div className="font-mono text-[11px] text-brand-warn font-bold mb-1">Market Resolution PnL</div>
                                            <div className="text-xs text-brand-muted leading-relaxed">Post-settlement updates not yet wired. Realized PnL figures remain incomplete.</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Validation History */}
                            <div className="glass-panel p-6 rounded-lg">
                                <h3 className="font-display text-lg font-semibold text-white tracking-widest uppercase mb-4">SENTINEL Validation Logs</h3>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left font-mono text-[10px]">
                                        <thead className="text-brand-muted border-b border-brand-border">
                                            <tr>
                                                <th className="pb-2 font-normal">PHASE</th>
                                                <th className="pb-2 font-normal">MODULE</th>
                                                <th className="pb-2 font-normal">METRICS</th>
                                                <th className="pb-2 font-normal text-right">VERDICT</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-slate-300">
                                            {[
                                                { p: '14.0', m: 'Live Deployment Stage 1', t: '30 tests', v: 'APPROVED', c: 'text-brand-success' },
                                                { p: '13.0', m: 'Pre-Live Validation', t: '50 tests', v: 'READY', c: 'text-brand-success' },
                                                { p: '10.9', m: 'Final Paper Run Validation', t: '513 tests', v: 'GO-LIVE', c: 'text-brand-success font-bold' },
                                                { p: '10.4', m: 'Live Paper Observation', t: '467 tests', v: 'CONDITIONAL', c: 'text-brand-warn' },
                                            ].map((r, i) => (
                                                <tr key={i} className="border-b border-brand-border/30 hover:bg-brand-surface2">
                                                    <td className="py-3">{r.p}</td>
                                                    <td className="py-3">{r.m}</td>
                                                    <td className="py-3">{r.t}</td>
                                                    <td className={`py-3 text-right ${r.c}`}>[{r.v}]</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [isBooting, setIsBooting] = useState(true);

            return isBooting ? (
                <BootSequence onComplete={() => setIsBooting(false)} />
            ) : (
                <Dashboard />
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
