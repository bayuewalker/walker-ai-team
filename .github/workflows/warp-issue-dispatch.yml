name: WARP Issue Dispatch

on:
  issues:
    types: [opened, reopened]

jobs:
  # ── Step 1: validate issue fields ──────────────────────────────────────────
  validate:
    name: Validate WARP task brief
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'warp-task')
    outputs:
      valid: ${{ steps.parse.outputs.valid }}
      role: ${{ steps.parse.outputs.role }}
      branch: ${{ steps.parse.outputs.branch }}
      tier: ${{ steps.parse.outputs.tier }}
      scope: ${{ steps.parse.outputs.scope }}
      done_criteria: ${{ steps.parse.outputs.done_criteria }}
      missing_fields: ${{ steps.parse.outputs.missing_fields }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse issue
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python3 .github/scripts/parse_warp_issue.py

      - name: Post validation failure comment
        if: steps.parse.outputs.valid == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const missing = `${{ steps.parse.outputs.missing_fields }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                "## ⚠️ WARP Task Brief — Validation Failed",
                "",
                "The following required fields are missing or invalid:",
                "",
                missing,
                "",
                "**Hard stop conditions (AGENTS.md):**",
                "- Branch must be `WARP/{feature}` format",
                "- Role must be declared",
                "- Tier must be declared",
                "- WARP•SENTINEL cannot run on MINOR or STANDARD tier",
                "",
                "Please edit the issue to fix the fields above.",
              ].join("\n")
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ["validation-failed"]
            });

      - name: Post validation success comment
        if: steps.parse.outputs.valid == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const role   = `${{ steps.parse.outputs.role }}`;
            const branch = `${{ steps.parse.outputs.branch }}`;
            const tier   = `${{ steps.parse.outputs.tier }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                "## ✅ WARP Task Brief — Validated",
                "",
                `| Field | Value |`,
                `|---|---|`,
                `| Role | \`${role}\` |`,
                `| Branch | \`${branch}\` |`,
                `| Tier | \`${tier}\` |`,
                "",
                "Dispatching to Ona environment...",
              ].join("\n")
            });

  # ── Step 2: dispatch to Ona environment ────────────────────────────────────
  dispatch:
    name: Dispatch to Ona
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.valid == 'true'

    steps:
      - name: Install Gitpod CLI
        run: |
          curl -fsSL https://gitpod.io/idt/install.sh | sh
          echo "$HOME/.gitpod/bin" >> $GITHUB_PATH

      - name: Authenticate Gitpod CLI
        env:
          GITPOD_TOKEN: ${{ secrets.GITPOD_TOKEN }}
        run: |
          gitpod login --token "$GITPOD_TOKEN" --host app.gitpod.io

      - name: Find running environment
        id: find-env
        env:
          GITPOD_TOKEN: ${{ secrets.GITPOD_TOKEN }}
        run: |
          ENV_ID=$(gitpod environment list -o json | \
            python3 -c "
          import json, sys
          envs = json.load(sys.stdin)
          for e in envs:
              if e.get('phase') == 'ENVIRONMENT_PHASE_RUNNING':
                  print(e['id'])
                  break
          ")
          if [ -z "$ENV_ID" ]; then
            echo "ERROR: No running Ona environment found" >&2
            exit 1
          fi
          echo "env_id=$ENV_ID" >> $GITHUB_OUTPUT
          echo "Found environment: $ENV_ID"

      - name: Dispatch task to Ona
        id: dispatch
        env:
          GITPOD_TOKEN: ${{ secrets.GITPOD_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          WARP_ROLE: ${{ needs.validate.outputs.role }}
          WARP_BRANCH: ${{ needs.validate.outputs.branch }}
          WARP_TIER: ${{ needs.validate.outputs.tier }}
          WARP_SCOPE: ${{ needs.validate.outputs.scope }}
          WARP_DONE_CRITERIA: ${{ needs.validate.outputs.done_criteria }}
        run: |
          ENV_ID="${{ steps.find-env.outputs.env_id }}"

          # Write task brief to a temp file inside the environment
          TASK_JSON=$(python3 -c "
          import json, os
          print(json.dumps({
              'issue_number': os.environ['ISSUE_NUMBER'],
              'issue_title':  os.environ['ISSUE_TITLE'],
              'issue_url':    os.environ['ISSUE_URL'],
              'role':         os.environ['WARP_ROLE'],
              'branch':       os.environ['WARP_BRANCH'],
              'tier':         os.environ['WARP_TIER'],
              'scope':        os.environ['WARP_SCOPE'],
              'done_criteria':os.environ['WARP_DONE_CRITERIA'],
          }))
          ")

          # Exec into environment: write task file + trigger Ona agent
          gitpod environment exec "$ENV_ID" \
            --working-dir /workspaces/walkermind-os \
            --timeout 30 \
            -- bash -c "
              mkdir -p .warp/tasks
              echo '$TASK_JSON' > .warp/tasks/issue-\$ISSUE_NUMBER.json
              echo 'Task brief written: .warp/tasks/issue-\$ISSUE_NUMBER.json'
            "

      - name: Post dispatch confirmation
        uses: actions/github-script@v7
        with:
          script: |
            const role   = `${{ needs.validate.outputs.role }}`;
            const branch = `${{ needs.validate.outputs.branch }}`;
            const tier   = `${{ needs.validate.outputs.tier }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                "## 🚀 Dispatched to Ona",
                "",
                `Task brief delivered to Ona environment.`,
                "",
                `| Field | Value |`,
                `|---|---|`,
                `| Role | \`${role}\` |`,
                `| Branch | \`${branch}\` |`,
                `| Tier | \`${tier}\` |`,
                "",
                "Ona will:",
                "1. Read `AGENTS.md` → `PROJECT_REGISTRY.md` → `PROJECT_STATE.md` → latest forge report",
                "2. Execute per declared role",
                "3. Post done output as comment on this issue",
                "4. Open PR on `" + branch + "` — WARP🔹CMD decides merge",
              ].join("\n")
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ["dispatched"]
            });

      - name: Post dispatch failure
        if: failure() && steps.find-env.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                "## ❌ Dispatch Failed — No Running Environment",
                "",
                "No running Ona environment was found.",
                "",
                "**Action required (WARP🔹CMD):**",
                "Start the Ona environment at [app.gitpod.io](https://app.gitpod.io), then re-open this issue.",
              ].join("\n")
            });
